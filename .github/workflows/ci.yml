name: AIHub CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: aihub
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: Build with Maven (compile + test)
        run: ./mvnw verify -pl ai-common,ai-gateway,ai-auth-service,ai-user-service,ai-image-service,ai-video-service,ai-payment-service,ai-admin-service -am -DskipITs

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jdk${{ matrix.java }}
          path: |
            **/target/surefire-reports/*.xml
            **/target/surefire-reports/*.txt

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'maven'

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      - name: Package all modules
        run: ./mvnw package -DskipTests -DskipITs

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: |
            ai-gateway/target/*.jar
            ai-auth-service/target/*.jar
            ai-user-service/target/*.jar
            ai-chat-service/target/*.jar
            ai-image-service/target/*.jar
            ai-video-service/target/*.jar
            ai-payment-service/target/*.jar
            ai-admin-service/target/*.jar
