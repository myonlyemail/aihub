server:
  port: 9003

spring:
  application:
    name: ai-image-service
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/aihub?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.aihub: DEBUG

# MinIO 对象存储
minio:
  endpoint: http://127.0.0.1:9000
  access-key: admin
  secret-key: admin123456

# AI Provider 配置
aihub:
  provider:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    sd:
      api-key: ${SD_API_KEY:}
      base-url: ${SD_BASE_URL:https://api.stability.ai}
    flux:
      api-key: ${FLUX_API_KEY:}
      base-url: ${FLUX_BASE_URL:https://api.bfl.ml}
